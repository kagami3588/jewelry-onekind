<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>占星術鑑定 | One of a Kind</title>
        <link rel="stylesheet" href="../css/style.css" />
        </head>
        <body>

          <!-- NAV -->
            <nav style="padding:20px 5%;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;background:#050505;">
                <a href="../index.html" style="color:#c9a84c;font-size:1.1rem;letter-spacing:0.1em;">One of a Kind</a>
                    <a href="products.html" style="color:#888;font-size:0.9rem;">商品・価格</a>
                      </nav>

                        <!-- FORM PAGE -->
                          <main class="form-page">

                              <h1>占星術鑑定フォーム</h1>
                                  <p class="lead">
                                        生年月日・出生時間・出生地を入力してください。<br>
                                              スリランカの占星術師があなただけの宝石を特定します。
                                                  </p>

                                                      <!-- =========================================
                                                               STEP 1: 個人情報
                                                                        ========================================= -->
                                                                            <section class="form-section">
                                                                                  <h2 class="form-section-title">STEP 1 ― 基本情報</h2>

                                                                                        <div class="form-group">
                                                                                                <label for="name">お名前 <span class="req">*</span></label>
                                                                                                        <input type="text" id="name" name="name" placeholder="山田 花子" required />
                                                                                                              </div>
                                                                                                              
                                                                                                                    <div class="form-group">
                                                                                                                            <label for="email">メールアドレス <span class="req">*</span></label>
                                                                                                                                    <input type="email" id="email" name="email" placeholder="example@email.com" required />
                                                                                                                                          </div>
                                                                                                                                          
                                                                                                                                                <div class="form-group">
                                                                                                                                                        <label for="phone">電話番号（任意）</label>
                                                                                                                                                                <input type="tel" id="phone" name="phone" placeholder="090-0000-0000" />
                                                                                                                                                                      </div>
                                                                                                                                                                          </section>
                                                                                                                                                                          
                                                                                                                                                                              <!-- =========================================
                                                                                                                                                                                       STEP 2: 占星術情報
                                                                                                                                                                                                ========================================= -->
                                                                                                                                                                                                    <section class="form-section">
                                                                                                                                                                                                          <h2 class="form-section-title">STEP 2 ― 生年月日・出生情報</h2>
                                                                                                                                                                                                          
                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                        <label for="birthdate">生年月日 <span class="req">*</span></label>
                                                                                                                                                                                                                                <input type="date" id="birthdate" name="birthdate" required />
                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                            <div class="form-group">
                                                                                                                                                                                                                                                    <label for="birthtime">出生時間（わかる範囲で）</label>
                                                                                                                                                                                                                                                            <select id="birthtime" name="birthtime">
                                                                                                                                                                                                                                                                      <option value="">-- 選択してください --</option>
                                                                                                                                                                                                                                                                                <option value="morning">朝（6:00〜11:59）</option>
                                                                                                                                                                                                                                                                                          <option value="noon">昼（12:00〜14:00）</option>
                                                                                                                                                                                                                                                                                                    <option value="afternoon">午後（14:01〜17:59）</option>
                                                                                                                                                                                                                                                                                                              <option value="evening">夕方（18:00〜20:59）</option>
                                                                                                                                                                                                                                                                                                                        <option value="night">夜（21:00〜23:59）</option>
                                                                                                                                                                                                                                                                                                                                  <option value="midnight">深夜（0:00〜5:59）</option>
                                                                                                                                                                                                                                                                                                                                            <option value="unknown">わからない</option>
                                                                                                                                                                                                                                                                                                                                                    </select>
                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                        <label for="birthplace">出生地（都市名・都道府県） <span class="req">*</span></label>
                                                                                                                                                                                                                                                                                                                                                                                <input type="text" id="birthplace" name="birthplace" placeholder="例：東京都、大阪市、Sri Lanka..." required />
                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                          </section>
                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                              <!-- =========================================
                                                                                                                                                                                                                                                                                                                                                                                                       STEP 3: ご希望・予算
                                                                                                                                                                                                                                                                                                                                                                                                                ========================================= -->
                                                                                                                                                                                                                                                                                                                                                                                                                    <section class="form-section">
                                                                                                                                                                                                                                                                                                                                                                                                                          <h2 class="form-section-title">STEP 3 ― ご希望のジュエリー</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                        <label for="jewelry-type">ジュエリーの種類 <span class="req">*</span></label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                <select id="jewelry-type" name="jewelry_type" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                          <option value="">-- 選択してください --</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="ring">指輪（リング）</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option value="pendant">ペンダント・ネックレス</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="bracelet">ブレスレット</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option value="earring">イヤリング・ピアス</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option value="loose">ルース（石のみ）</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option value="undecided">まだ決めていない</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <label for="purpose">用途・目的</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <select id="purpose" name="purpose">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="">-- 選択してください --</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option value="self">自分用</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="engagement">婚約・プロポーズ</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option value="wedding">結婚（マリッジリング）</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option value="anniversary">記念日・アニバーサリー</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option value="gift">プレゼント・贈り物</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option value="other">その他</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label for="budget">ご予算の目安</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select id="budget" name="budget">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option value="">-- 選択してください --</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="30k">占星術鑑定のみ（¥30,000）</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option value="500k">50万円〜100万円</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option value="1m">100万円〜300万円</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option value="3m">300万円以上</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option value="discuss">相談したい</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label for="experience">現地採掘体験</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select id="experience" name="experience">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option value="">-- 選択してください --</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="virtual">バーチャル体験（動画で確認）</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option value="real">現地スリランカに行きたい</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option value="undecided">まだ決めていない</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label for="message">その他・ご要望・メッセージ</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <textarea id="message" name="message" placeholder="デザインのイメージや、特別な想いなどがあればご記入ください。"></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </section>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <!-- SUBMIT -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div style="text-align:center;margin-top:48px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button type="submit" class="btn-primary" style="border:none;cursor:pointer;font-size:1rem;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                鑑定を申し込む
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <p style="margin-top:20px;color:#666;font-size:0.85rem;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ※ 送信後、担当者より3営業日以内にご連絡いたします。
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </main>
